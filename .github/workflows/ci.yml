name: Basic project check

run-name: Checking basic project health.
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  basic_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml ruff==0.3.7
      - name: Validate YAML files
        run: |
          python - <<'PY'
          from pathlib import Path

          import yaml

          failed = False
          for path in sorted(list(Path(".").rglob("*.yml")) + list(Path(".").rglob("*.yaml"))):
              if ".git" in path.parts:
                  continue
              try:
                  with path.open("r", encoding="utf-8") as handle:
                      yaml.safe_load(handle)
              except Exception as exc:
                  failed = True
                  print(f"{path}: {exc}")

          if failed:
              raise SystemExit(1)
          PY
      - name: Check for syntax errors
        run: |
          python -m compileall -q .
      - name: Check for critical Python errors
        run: |
          ruff check . --select E9,F63,F7,F82
      - name: Check for accidentally committed large files
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          limit_mb = 100
          tracked = subprocess.check_output(["git", "ls-files", "-z"]).decode().split("\0")
          oversized = []

          for filename in tracked:
              if not filename:
                  continue
              path = Path(filename)
              if not path.is_file():
                  continue
              size_mb = path.stat().st_size / 1024 / 1024
              if size_mb > limit_mb:
                  oversized.append((path, size_mb))

          if oversized:
              for path, size_mb in oversized:
                  print(f"{path}: {size_mb:.1f} MB")
              raise SystemExit(f"Files larger than {limit_mb} MB found.")
          PY
